Transform: AWS::Serverless-2016-10-31

Parameters:
  StandardSenderQueueMessageGroupId:
    Type: String
  MasterKmsSecretsName:
    Type: String
  LambdaFunctionRoleArn:
    Type: String
  DatabaseName:
    Type: String
  DbSecretsName:
    Type: String
  DatabaseAccessSecurityGroup:
    Type: String
  PrivateSubnets:
    Type: String
  StandardTxSenderQueueName:
    Type: String
  StandardTxSignerQueueName:
    Type: String
  StandardTxSignerDlqName:
    Type: String

Resources:
  StandardTxSignerDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref StandardTxSignerDlqName
      FifoQueue: true
      ContentBasedDeduplication: true

  StandardTxSignerQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref StandardTxSignerQueueName
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt StandardTxSignerDeadLetterQueue.Arn
        maxReceiveCount: 5

  StandardTxSignerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Handler: bootstrap
      CodeUri: ../../../target/lambda/aws_standard_tx_signer
      Timeout: 300
      Role: !Ref LambdaFunctionRoleArn
      Environment:
        Variables:
          DATABASE_URL: !Join
            - ""
            - - "postgresql://"
              - "{{resolve:secretsmanager:"
              - !Ref DbSecretsName
              - ":SecretString:username}}"
              - ":"
              - "{{resolve:secretsmanager:"
              - !Ref DbSecretsName
              - ":SecretString:password}}"
              - "@"
              - "{{resolve:secretsmanager:"
              - !Ref DbSecretsName
              - ":SecretString:host}}"
              - ":"
              - "{{resolve:secretsmanager:"
              - !Ref DbSecretsName
              - ":SecretString:port}}"
              - "/"
              - !Ref DatabaseName
          STANDARD_SENDER_QUEUE_MESSAGE_GROUP_ID: !Ref StandardSenderQueueMessageGroupId
          STANDARD_SENDER_QUEUE_URL: !Sub "https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/${StandardTxSenderQueueName}"
          USE_KMS: true
          SIGNER_KMS_ID: !Join
            - ""
            - - "{{resolve:secretsmanager:"
              - !Ref MasterKmsSecretsName
              - ":SecretString:AA_MASTER_KMS_ID}}"
      VpcConfig:
        SecurityGroupIds:
          - !Ref DatabaseAccessSecurityGroup
        SubnetIds: !Split [",", !Ref PrivateSubnets]
      Events:
        StandardTxSignerQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt StandardTxSignerQueue.Arn
            BatchSize: 5
            FunctionResponseTypes:
              - ReportBatchItemFailures
