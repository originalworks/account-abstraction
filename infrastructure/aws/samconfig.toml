version = 0.1

[dev.deploy.parameters]
stack_name = "aa-infra-dev"
region = "us-east-1"
s3_bucket = "ow-protocol-artifacts"
s3_prefix = "dev"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM"
parameter_overrides = [
    "AaBlobBucketName=aa-blob-bucket-dev",
    "DbSecretsName='/rev/dev/db-secret'",
    "MasterKmsSecretsName='/rev/dev/secrets'",
    "DatabaseName=account_abstraction_dev_db",
    "PrivateSubnets=/dev-stage/network/private-subnet-ids",
    "DatabaseAccessSecurityGroup=/dev/database/access-security-group-id",
    "OutcomeEventBusName=aa-dev-transaction-outcome-bus",
    "ReceiptPollerCleanupSchedulerRate='5 minutes'",

    "StandardTxSignerQueueName=aa-dev-standard-tx-signer.fifo",
    "StandardTxSignerDlqName=aa-dev-standard-tx-signer-dlq.fifo",

    "StandardTxSenderQueueName=aa-dev-standard-tx-sender.fifo",
    "StandardTxSenderDlqName=aa-dev-standard-tx-sender-dlq.fifo",

    "ReceiptPollerQueueName=aa-dev-receipt-poller.fifo",
    "ReceiptPollerDlqName=aa-dev-receipt-poller-dlq.fifo",

    "RetryQueueName=aa-dev-retry.fifo",
    "RetryDlqName=aa-dev-retry-dlq.fifo",
]

[stage.deploy.parameters]
stack_name = "aa-infra-stage"
region = "us-east-1"
s3_bucket = "ow-protocol-artifacts"
s3_prefix = "stage"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM"
parameter_overrides = [
    "AaBlobBucketName=aa-blob-bucket-stage",
    "DbSecretsName='/rev/stage/db-secret'",
    "MasterKmsSecretsName='/rev/stage/secrets'",
    "DatabaseName=account_abstraction_stage_db",
    "PrivateSubnets=/dev-stage/network/private-subnet-ids",
    "DatabaseAccessSecurityGroup=/stage/database/access-security-group-id",
    "OutcomeEventBusName=aa-stage-transaction-outcome-bus",
    "ReceiptPollerCleanupSchedulerRate='5 minutes'",


    "StandardTxSignerQueueName=aa-stage-standard-tx-signer.fifo",
    "StandardTxSignerDlqName=aa-stage-standard-tx-signer-dlq.fifo",

    "StandardTxSenderQueueName=aa-stage-standard-tx-sender.fifo",
    "StandardTxSenderDlqName=aa-stage-standard-tx-sender-dlq.fifo",

    "ReceiptPollerQueueName=aa-stage-receipt-poller.fifo",
    "ReceiptPollerDlqName=aa-stage-receipt-poller-dlq.fifo",

    "RetryQueueName=aa-stage-retry.fifo",
    "RetryDlqName=aa-stage-retry-dlq.fifo",

]

[prod.deploy.parameters]
stack_name = "aa-infra-prod"
region = "us-east-1"
s3_bucket = "ow-protocol-artifacts"
s3_prefix = "prod"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM"
parameter_overrides = ["AaBlobBucketName=aa-blob-bucket-prod"]
