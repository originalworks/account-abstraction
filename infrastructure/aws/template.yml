Transform: AWS::Serverless-2016-10-31

Parameters:
  DatabaseName:
    Type: String
  DbSecretsName:
    Type: String
  AaBlobBucketName:
    Type: String

Resources:
  AaBlobBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref AaBlobBucketName

  MigrationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Handler: bootstrap
      CodeUri: ../../target/lambda/aws_migrator
      Timeout: 300
      Role: !GetAtt MigrationsFunctionRole.Arn
      Environment:
        Variables:
          AWS_DATABASE_SECRETS_NAME: !Ref DbSecretsName
          DATABASE_NAME: !Ref DatabaseName

  MigrationsFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: GetDbSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DbSecretsName}*"
