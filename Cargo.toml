[workspace]
resolver = "3"

members = [
    "rust/transaction_signer",
    "rust/transaction_db",
    "rust/transaction_sender",
    "rust/operator_wallet_db",
    "rust/migrator",
    "rust/transaction_assignment_db",
    "rust/receipt_poller",
    "rust/network_db",
]

[workspace.dependencies]
transaction_db = { path = "./rust/transaction_db" }
network_db = { path = "./rust/network_db" }
anyhow = "1.0.102"
tokio = "1.49.0"
serde = "1.0.228"
serde_json = "1.0.149"
hex = "0.4.3"
sqlx = "0.8.6"
ow_wallet_adapter = "0.1.1"
time = "0.3.47"
uuid = "1.21.0"

aws-config = "1.8.13"
lambda_runtime = "1.0.2"
aws-sdk-sqs = "1.85.0"
aws_lambda_events = "1.0.3"
