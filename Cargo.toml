[workspace]
resolver = "3"

members = [
    "rust/database/operator_wallet_db",
    "rust/database/tx_request_db",
    "rust/database/transaction_assignment_db",
    "rust/database/network_db",
    "rust/database/migrator",
    "rust/signer",
    "rust/sender",
    "rust/receipt_poller",
    "rust/sender_queue",
]

[workspace.dependencies]
tx_request_db = { path = "./rust/database/tx_request_db" }
network_db = { path = "./rust/database/network_db" }
sender_queue = { path = "./rust/sender_queue" }
transaction_assignment_db = { path = "./rust/database/transaction_assignment_db" }
operator_wallet_db = { path = "./rust/database/operator_wallet_db" }
anyhow = "1.0.102"
tokio = "1.49.0"
serde = "1.0.228"
serde_json = "1.0.149"
hex = "0.4.3"
sqlx = "0.8.6"
ow_wallet_adapter = "0.1.4"
time = "0.3.47"
uuid = "1.21.0"

aws-config = "1.8.13"
lambda_runtime = "1.0.2"
aws-sdk-sqs = "1.85.0"
aws_lambda_events = "1.0.3"
